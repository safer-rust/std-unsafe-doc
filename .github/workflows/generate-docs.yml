name: Generate docs/index.html

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly-2025-12-06
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-12-06
          components: rust-src

      - name: Generate docs/index.html
        run: |
          mkdir -p docs
          python3 scripts/extract_public_unsafe.py docs/index.html

      - name: Commit and push docs/index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate docs/index.html [skip ci]"
            git push
          fi
